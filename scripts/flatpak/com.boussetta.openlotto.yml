app-id: com.boussetta.openlotto
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm16

command: open-lotto

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri                 # OpenGL GPU access
  - --filesystem=home            # Allow saving to home directory

cleanup:
  - '*.a'
  - '*.la'
  - /include
  - /lib/cmake
  - /lib/pkgconfig
  - /share/pkgconfig

modules:
  - name: SDL2
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
      - -DSDL_WAYLAND=ON
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL/releases/download/release-2.26.5/SDL2-2.26.5.tar.gz
        sha256: 6c94b2e20e0b37bb48e9264d3ca6b06dc089e758e7e4b9b7644dbb1b4ef37f70

  - name: SDL2_ttf
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: archive
        url: https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.20.2/SDL2_ttf-2.20.2.tar.gz
        sha256: 542b52072ff0dcf69d8b214e2df5a80c5b4e42b02d0fb66e2d5a1f66269fab03

  - name: open-lotto
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_TESTING=OFF
    sources:
      - type: dir
        path: .
