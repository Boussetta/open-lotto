name: Auto-label PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v4
        with:
          configuration-path: .github/labeler.yml

      # Add additional labels based on PR context
      - name: Add bug label if title contains "fix"
        if: contains(github.event.pull_request.title, 'fix') || contains(github.event.pull_request.title, 'bug')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['bug']
            })

      - name: Add feature label if title contains "feat"
        if: contains(github.event.pull_request.title, 'feat') || contains(github.event.pull_request.title, 'feature')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['enhancement']
            })

      - name: Add documentation label if title contains "docs"
        if: contains(github.event.pull_request.title, 'docs') || contains(github.event.pull_request.title, 'doc')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['documentation']
            })

      - name: Add performance label if title contains "perf"
        if: contains(github.event.pull_request.title, 'perf') || contains(github.event.pull_request.title, 'performance')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['performance']
            })
