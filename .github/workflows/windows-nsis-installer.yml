name: Windows NSIS Installer Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: '0.7.0'

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        run: choco install nsis -y

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-glew
            mingw-w64-x86_64-openmp

      - name: Build open-lotto
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF ..
          cmake --build . --config Release

      - name: Copy DLL dependencies
        shell: msys2 {0}
        run: |
          # Stage executable where NSIS script expects it
          cp build/open-lotto.exe ./open-lotto.exe || cp build/open-lotto ./open-lotto.exe

          # Normalize plugin output location for packaging.
          # On MinGW builds, plugin DLLs may be emitted in build/ instead of build/plugins/.
          mkdir -p build/plugins
          while IFS= read -r plugin_dll; do
            cp "$plugin_dll" build/plugins/
          done < <(
            find build -maxdepth 2 -type f -name '*.dll' \
              ! -name 'open-lotto.exe' \
              ! -name 'SDL2.dll' \
              ! -name 'SDL2_ttf.dll' \
              ! -name 'libwinpthread-1.dll'
          )

          echo "Bundled plugins:"
          ls -1 build/plugins/*.dll

          # Seed DLL set required by our binary.
          cp /mingw64/bin/SDL2.dll .
          cp /mingw64/bin/SDL2_ttf.dll .
          cp /mingw64/bin/glew32.dll . || echo "Warning: glew32.dll not found"

          # Recursively copy transitive runtime DLL dependencies from /mingw64/bin.
          queue=(./open-lotto.exe ./SDL2.dll ./SDL2_ttf.dll)
          i=0
          while [[ $i -lt ${#queue[@]} ]]; do
            bin="${queue[$i]}"
            i=$((i + 1))

            while IFS= read -r dep; do
              [[ -z "$dep" ]] && continue
              base="$(basename "$dep")"
              if [[ ! -f "./$base" ]]; then
                cp "$dep" "./$base"
                queue+=("./$base")
              fi
            done < <(
              ldd "$bin" 2>/dev/null | awk '
                /=> \/mingw64\/bin\// {print $3}
                /^\/mingw64\/bin\// {print $1}
              '
            )
          done

          echo "Bundled runtime files:"
          ls -1 ./*.dll

      - name: Build NSIS Installer
        run: |
          # Update version in NSIS script
          $nsiContent = Get-Content scripts/windows/open-lotto-installer.nsi -Raw
          $nsiContent = $nsiContent -replace '0\.7\.0', '${{ github.event.inputs.version }}'
          Set-Content -Path scripts/windows/open-lotto-installer.nsi -Value $nsiContent
          
          # Run NSIS
          & "C:\Program Files (x86)\NSIS\makensis.exe" scripts/windows/open-lotto-installer.nsi

      - name: Generate checksum
        run: |
          CertUtil -hashfile "scripts/windows/open-lotto-x64-setup.exe" SHA256 | Tee-Object checksums.txt

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: open-lotto-windows-installer
          path: |
            scripts/windows/open-lotto-x64-setup.exe
            checksums.txt

      - name: Upload to Release
        if: success()
        continue-on-error: true
        run: |
          $tag = "${{ github.event.inputs.version }}"
          if ($tag -notmatch '^v') { $tag = "v$tag" }
          gh release upload "$tag" "scripts/windows/open-lotto-x64-setup.exe" --clobber
          gh release upload "$tag" "checksums.txt" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
