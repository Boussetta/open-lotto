name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc pkg-config libsdl2-dev libsdl2-ttf-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  format-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check code formatting
        run: |
          clang-format -n -Werror $(find src plugins include tests -name "*.c" -o -name "*.h")

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc pkg-config libsdl2-dev libsdl2-ttf-dev

      - name: Configure with ASan/UBSan
        run: |
          cmake -S . -B build-sanitizer \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=undefined -g"

      - name: Build with sanitizers
        run: cmake --build build-sanitizer --config Debug -j

      - name: Run tests with sanitizers
        run: ctest --test-dir build-sanitizer --output-on-failure
        env:
          ASAN_OPTIONS: "halt_on_error=1:exitcode=99"

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: ./scripts/run_cppcheck.sh

