name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc,   cxx: g++     }
          - { cc: clang, cxx: clang++ }

    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-build-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-build-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc clang pkg-config libsdl2-dev libsdl2-ttf-dev

      - name: Clean build directory
        run: rm -rf build

      - name: Cache CMake build dir
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-build-${{ matrix.compiler.cc }}-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'plugins/**', 'include/**') }}
          restore-keys: cmake-build-${{ matrix.compiler.cc }}-${{ runner.os }}-

      - name: Verify compiler
        run: |
          which ${{ matrix.compiler.cc }}
          ${{ matrix.compiler.cc }} --version

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }}

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  format-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-format-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-format-${{ runner.os }}-

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check code formatting
        run: |
          clang-format -n -Werror $(find src plugins include tests -name "*.c" -o -name "*.h")

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc,   cxx: g++     }
          - { cc: clang, cxx: clang++ }

    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-sanitizers-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-sanitizers-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc clang pkg-config libsdl2-dev libsdl2-ttf-dev

      - name: Clean sanitizer build directory
        run: rm -rf build-sanitizer

      - name: Cache CMake sanitizer build dir
        uses: actions/cache@v4
        with:
          path: build-sanitizer
          key: cmake-sanitizers-${{ matrix.compiler.cc }}-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'plugins/**', 'include/**') }}
          restore-keys: cmake-sanitizers-${{ matrix.compiler.cc }}-${{ runner.os }}-

      - name: Verify compiler
        run: |
          which ${{ matrix.compiler.cc }}
          ${{ matrix.compiler.cc }} --version

      - name: Configure with ASan/UBSan
        run: |
          cmake -S . -B build-sanitizer \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=undefined -g"

      - name: Build with sanitizers
        run: cmake --build build-sanitizer --config Debug -j

      - name: Run tests with sanitizers
        run: ctest --test-dir build-sanitizer --output-on-failure
        env:
          ASAN_OPTIONS: "halt_on_error=1:exitcode=99"

  security-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run REUSE compliance check
        uses: fsfe/reuse-action@v3
        with:
          fail-on: warning

  performance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-perf-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-perf-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc pkg-config libsdl2-dev libsdl2-ttf-dev python3

      - name: Clean build directory
        run: rm -rf build

      - name: Build Release
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++
          cmake --build build --config Release

      - name: Run benchmarks
        run: ./scripts/run_benchmarks.sh build/benchmark_results.json build

      - name: Check performance regressions
        run: ./scripts/check_performance_regression.sh build/benchmark_results.json .github/benchmark_baseline.json 5

      - name: Archive baseline to history
        if: always() && hashFiles('build/benchmark_results.json') != ''
        run: |
          python3 ./scripts/manage_baselines.py add build/benchmark_results.json \
            --commit ${{ github.sha }} \
            --arch x86_64

      - name: Upload benchmark results
        if: always() && hashFiles('build/benchmark_results.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: build/benchmark_results.json

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-static-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-static-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang-tidy cppcheck

      - name: Cache CMake tidy build
        uses: actions/cache@v4
        with:
          path: build-tidy
          key: cmake-tidy-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'plugins/**', 'include/**') }}
          restore-keys: cmake-tidy-${{ runner.os }}-

      - name: Run cppcheck
        run: ./scripts/run_cppcheck.sh

      - name: Run clang-tidy
        run: ./scripts/run_clang_tidy.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-coverage-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-coverage-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc pkg-config libsdl2-dev libsdl2-ttf-dev lcov

      - name: Clean build directory
        run: rm -rf .build-coverage

      - name: Run coverage analysis
        run: ./scripts/run_coverage.sh

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-docs-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-docs-${{ runner.os }}-

      - name: Install doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Generate API documentation
        run: ./scripts/generate_docs.sh

      - name: Upload HTML docs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/api/html/
          retention-days: 30

