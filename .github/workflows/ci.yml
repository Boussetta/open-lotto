name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc,   cxx: g++   }
    # TODO: Re-add clang after resolving compiler detection in CI environment

    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-build-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-build-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc clang pkg-config libsdl2-dev libsdl2-ttf-dev

      - name: Clean build directory
        run: rm -rf build

      - name: Cache CMake build dir
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-build-${{ matrix.compiler.cc }}-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'plugins/**', 'include/**') }}
          restore-keys: cmake-build-${{ matrix.compiler.cc }}-${{ runner.os }}-

      - name: Verify compiler
        run: |
          which ${{ matrix.compiler.cc }}
          ${{ matrix.compiler.cc }} --version

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }}

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  format-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-format-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-format-${{ runner.os }}-

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check code formatting
        run: |
          clang-format -n -Werror $(find src plugins include tests -name "*.c" -o -name "*.h")

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - { cc: gcc,   cxx: g++   }
    # TODO: Re-add clang after resolving compiler detection in CI environment

    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-sanitizers-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-sanitizers-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc clang pkg-config libsdl2-dev libsdl2-ttf-dev

      - name: Clean sanitizer build directory
        run: rm -rf build-sanitizer

      - name: Cache CMake sanitizer build dir
        uses: actions/cache@v4
        with:
          path: build-sanitizer
          key: cmake-sanitizers-${{ matrix.compiler.cc }}-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'plugins/**', 'include/**') }}
          restore-keys: cmake-sanitizers-${{ matrix.compiler.cc }}-${{ runner.os }}-

      - name: Verify compiler
        run: |
          which ${{ matrix.compiler.cc }}
          ${{ matrix.compiler.cc }} --version

      - name: Configure with ASan/UBSan
        run: |
          cmake -S . -B build-sanitizer \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=undefined -g"

      - name: Build with sanitizers
        run: cmake --build build-sanitizer --config Debug -j

      - name: Run tests with sanitizers
        run: ctest --test-dir build-sanitizer --output-on-failure
        env:
          ASAN_OPTIONS: "halt_on_error=1:exitcode=99"

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-static-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-static-${{ runner.os }}-

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: ./scripts/run_cppcheck.sh

      - name: Install clang-tidy and build tools
        run: sudo apt-get install -y clang-tidy cmake gcc clang pkg-config libsdl2-dev libsdl2-ttf-dev

      - name: Clean tidy build directory
        run: rm -rf build-tidy

      - name: Generate compile commands
        run: |
          cmake -S . -B build-tidy \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DBUILD_TESTING=ON \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++

      - name: Run clang-tidy
        run: ./scripts/run_clang_tidy.sh

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-coverage-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: apt-coverage-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc pkg-config libsdl2-dev libsdl2-ttf-dev lcov

      - name: Run coverage
        run: ./scripts/run_coverage.sh

